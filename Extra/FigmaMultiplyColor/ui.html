<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<style>
			/* Use Figma's native UI variables for seamless Light/Dark mode integration */
			body {
				font-family: Inter, sans-serif;
				padding: 16px;
				margin: 0;
				display: flex;
				flex-direction: column;
				gap: 16px;
				background-color: var(--figma-color-bg);
				color: var(--figma-color-text);
			}
			.form-group {
				display: flex;
				flex-direction: column;
				gap: 8px;
			}
			label {
				font-size: 11px;
				font-weight: 500;
				display: flex;
				justify-content: space-between;
			}
			input[type="color"] {
				width: 100%;
				height: 32px;
				border: 1px solid var(--figma-color-border);
				border-radius: 4px;
				padding: 0;
				background: transparent;
				cursor: pointer;
			}
			input[type="range"] {
				width: 100%;
				margin: 0;
				cursor: pointer;
				accent-color: var(--figma-color-bg-brand);
			}
			button {
				background-color: var(--figma-color-bg-brand, #0d99ff);
				color: var(--figma-color-text-onbrand, white);
				border: none;
				border-radius: 6px;
				padding: 10px 16px;
				font-weight: 600;
				font-size: 13px;
				cursor: pointer;
				transition: background-color 0.2s;
			}
			button:hover {
				background-color: var(--figma-color-bg-brand-hover, #007be5);
			}
			.help-text {
				font-size: 10px;
				color: var(--figma-color-text-secondary);
				line-height: 1.4;
			}
		</style>
	</head>
	<body>
		<div class="form-group">
			<label>Overlay Color</label>
			<input type="color" id="color" value="#000000" />
		</div>

		<div class="form-group">
			<label>
				<span>Alpha (Opacity)</span>
				<span id="alpha-val">50%</span>
			</label>
			<input type="range" id="alpha" min="0" max="100" value="50" />
		</div>

		<button id="apply">Apply Multiply Overlay</button>

		<div class="help-text">
			Creates a smart mask group that preserves the image's original alpha
			transparency while applying your multiply color.
		</div>

		<script>
			const alphaInput = document.getElementById("alpha");
			const alphaVal = document.getElementById("alpha-val");
			const applyBtn = document.getElementById("apply");
			const colorInput = document.getElementById("color");

			// Update opacity label as slider moves
			alphaInput.addEventListener("input", (e) => {
				alphaVal.innerText = `${e.target.value}%`;
			});

			// Send payload to Figma backend
			applyBtn.onclick = () => {
				const hex = colorInput.value;
				const alpha = parseInt(alphaInput.value, 10);
				parent.postMessage(
					{ pluginMessage: { type: "apply-multiply", hex, alpha } },
					"*",
				);
			};
		</script>
	</body>
</html>
